services:
  - type: web
    name: multi-agent-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: multi-agent-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/multi-agent-ai/uploads
      - key: TEMP_DIR
        value: /tmp/multi-agent-ai
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: multi-agent-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NEXT_PUBLIC_API_HOST
        fromService:
          name: multi-agent-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

databases:
  - name: multi-agent-db
    plan: free
